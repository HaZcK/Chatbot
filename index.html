<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot AI</title>

    <!-- Icon -->
    <link rel="icon" href="assets/logo.svg">

    <!-- CSS -->
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader"></div>
        <h2>Memuat Chatbot...</h2>
    </div>

    <!-- App -->
    <div id="app">

        <!-- Sidebar -->
        <aside class="sidebar">

            <div class="sidebar-header">
                <h2>🤖 Chatbot</h2>
            </div>

            <button id="newChatBtn">
                + Chat Baru
            </button>

            <div class="chat-history" id="chatHistory">

                <!-- Chat Item -->
                <!-- Dibuat otomatis oleh JavaScript -->

            </div>

            <div class="sidebar-footer">
                <button id="settingBtn">
                    ⚙ Pengaturan
                </button>
            </div>

        </aside>

        <!-- Main -->
        <main class="main">

            <!-- Header -->
            <header class="header">

                <div class="header-left">
                    <h1>Chatbot AI</h1>
                    <span id="status">
                        ● Siap
                    </span>
                </div>

                <div class="header-right">

                    <button id="clearChat">
                        Hapus Chat
                    </button>

                </div>

            </header>

            <!-- Chat -->
            <section
                class="chat-container"
                id="chatContainer">

                <!-- Bubble Chat dibuat otomatis -->

            </section>

            <!-- Typing -->
            <div
                class="typing"
                id="typingIndicator"
                hidden>

                AI sedang mengetik...

            </div>

            <!-- Input -->
            <footer class="chat-input">

                <textarea
                    id="prompt"
                    placeholder="Ketik pesan..."
                    rows="1"></textarea>

                <button id="sendBtn">
                    Kirim
                </button>

            </footer>

        </main>

    </div>

    <!-- Settings -->
    <div
        class="modal"
        id="settingsModal"
        hidden>

        <div class="modal-content">

            <h2>Pengaturan</h2>

            <label>Groq API Key</label>

            <input
                type="password"
                id="apiKey"
                placeholder="gsk_...">

            <label>Model</label>

            <select id="model">

                <option value="openai/gpt-oss-20b">
                    GPT OSS 20B
                </option>

                <option value="llama-3.3-70b-versatile">
                    Llama 3.3 70B
                </option>

                <option value="moonshotai/kimi-k2-instruct">
                    Kimi K2
                </option>

            </select>

            <div class="modal-buttons">

                <button id="saveSetting">
                    Simpan
                </button>

                <button id="closeSetting">
                    Tutup
                </button>

            </div>

        </div>
    </div>

    <!-- Script -->
    <script src="Config.js"></script>
    <script src="Script.js"></script>

</body>
</html>
