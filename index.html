<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten AI - Didukung oleh Groq</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; background-color: #1e1e2e; color: #cdd6f4; margin: 0; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 10px; }
        .box { background: #313244; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input, textarea { width: 100%; padding: 12px; background: #45475a; border: 1px solid #585b70; color: #cdd6f4; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; font-size: 14px; }
        button { padding: 12px 20px; background-color: #a6e3a1; color: #11111b; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background-color: #94e2d5; }
        .chat-box { height: 350px; overflow-y: auto; background: #181825; border-radius: 8px; padding: 15px; margin-bottom: 12px; border: 1px solid #45475a; }
        .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .user-msg { background: #89b4fa; color: #11111b; margin-left: auto; text-align: left; }
        .ai-msg { background: #45475a; color: #cdd6f4; }
        .loader { display: none; text-align: center; color: #f9e2af; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- INPUT KUNCI UTAMA -->
    <div class="box">
        <h3 style="margin-top:0;">🔑 Masukkan API Key Groq</h3>
        <p style="font-size: 12px; color: #a6adc8; margin-top:-5px;">Dapatkan kunci akses resmi Anda di halaman console.groq.com</p>
        <input type="password" id="groqKey" placeholder="gsk_xxxxxxxxxxxxxxxxxxxx">
    </div>

    <!-- PINTU GERBANG UTAMA CHAT -->
    <div class="box">
        <h3 style="margin-top:0;">🤖 Groq AI Chat</h3>
        <div id="chatBox" class="chat-box">
            <div class="msg ai-msg">Halo! Tempel API Key Groq kamu di atas, lalu ketik pertanyaan di bawah ini. Mari kita uji seberapa cepat responnya!</div>
        </div>
        
        <div id="loadingTeks" class="loader">⚡ Menghubungi polisi server Groq... Memproses jawaban...</div>

        <textarea id="inputPesan" rows="3" placeholder="Ketik pesan untuk AI di sini..."></textarea>
        <button onclick="kirimKeGroq()">Kirim Pesan</button>
    </div>
</div>

<script>
    function kirimKeGroq() {
        const apiKey = document.getElementById("groqKey").value.trim();
        const pesanUser = document.getElementById("inputPesan").value.trim();
        const chatBox = document.getElementById("chatBox");
        const loader = document.getElementById("loadingTeks");

        if (!apiKey) {
            alert("❌ Berhenti! Polisi gerbang mendeteksi Anda belum memasukkan API Key.");
            return;
        }
        if (!pesanUser) return;

        // 1. Pajang pesan user di chat log
        chatBox.innerHTML += `<div class="msg user-msg">${pesanUser}</div>`;
        document.getElementById("inputPesan").value = ""; 
        chatBox.scrollTop = chatBox.scrollHeight; 

        // 2. Aktifkan animasi loading
        loader.style.display = "block";

        // 3. Tembak langsung ke Endpoint sesuai panduan dokumentasi resmi
        fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                messages: [{ role: "user", content: pesanUser }],
                model: "openai/gpt-oss-20b" // Menggunakan model default sesuai dokumentasi layar kamu
            })
        })
        .then(response => {
            if (!response.ok) {
                // Mengirimkan kode error (401, 404, atau 429) jika ditolak polisi server
                throw new Error(`Polisi Server Menolak Akses! Kode HTTP Status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            // 4. Ekstrak teks balasan dari struktur data balasan JSON
            const balasanAI = data.choices[0].message.content;
            
            loader.style.display = "none";
            chatBox.innerHTML += `<div class="msg ai-msg">${balasanAI}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        })
        .catch(error => {
            loader.style.display = "none";
            chatBox.innerHTML += `<div class="msg ai-msg" style="color: #f38ba8; border: 1px solid #f38ba8;">❌ Error: ${error.message}. Periksa kembali apakah kuncimu salah ketik atau format datamu diblokir.</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }
</script>
</body>
</html>
